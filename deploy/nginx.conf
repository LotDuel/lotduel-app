# ═══════════════════════════════════════════════════════════════
# LotDuel API — Nginx Configuration
# Domain: api.lotduel.com
# Proxies to gunicorn on 127.0.0.1:5000
# SSL will be added automatically by certbot
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name api.lotduel.com;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers (handled by Flask-CORS, but nginx adds for preflight)
    # Flask-CORS handles the actual CORS logic

    # Rate limiting zone (defined in nginx.conf http block)
    # Uncomment after adding to /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=lotduel_api:10m rate=30r/m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Rate limiting (uncomment after defining zone above)
        # limit_req zone=lotduel_api burst=10 nodelay;
    }

    # Health check (no rate limit)
    location /api/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block non-API paths
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/lotduel-api-access.log;
    error_log /var/log/nginx/lotduel-api-error.log;
}
